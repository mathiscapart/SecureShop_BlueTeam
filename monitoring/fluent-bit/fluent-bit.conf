[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         tail
    Path         /var/log/bunkerweb/access.log
    Tag          bw.access
    Parser       nginx
    DB           /tmp/fb_bw_access.db
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On
    Refresh_Interval 5

[INPUT]
    Name         tail
    Path         /var/log/bunkerweb/modsec_audit.log
    Tag          bw.modsec
    DB           /tmp/fb_bw_modsec.db
    Mem_Buf_Limit 5MB
    Skip_Long_Lines On

[INPUT]
    Name         tail
    Path         /var/log/bunkerweb/error.log
    Tag          bw.error
    DB           /tmp/fb_bw_error.db
    Mem_Buf_Limit 5MB

[INPUT]
    Name         tail
    Path         /var/ossec/logs/alerts/alerts.json
    Tag          wazuh.alerts
    Parser       json
    DB           /tmp/fb_wazuh.db
    Mem_Buf_Limit 5MB

[FILTER]
    Name         nest
    Match        wazuh.*
    Operation    lift
    Nested_under rule
    Add_prefix   rule_

[FILTER]
    Name         nest
    Match        wazuh.*
    Operation    lift
    Nested_under agent
    Add_prefix   agent_

[FILTER]
    Name         nest
    Match        wazuh.*
    Operation    lift
    Nested_under syscheck
    Add_prefix   syscheck_

[FILTER]
    Name         modify
    Match        wazuh.*
    Rename       rule_level      wazuh_level
    Rename       rule_description wazuh_description
    Rename       rule_id         wazuh_rule_id
    Rename       agent_name      wazuh_agent
    Rename       syscheck_path   wazuh_file
    Rename       location        wazuh_location

[FILTER]
    Name         log_to_metrics
    Match        bw.access
    Tag          metrics.http
    Metric_Mode  counter
    Metric_Name  http_requests_total
    Metric_Description Total HTTP requests by status code
    Label_field  status

[OUTPUT]
    Name         http
    Match        bw.*
    Host         openobserve
    Port         5080
    URI          /api/default/bunkerweb/_json
    Format       json
    Json_date_key _timestamp
    Json_date_format iso8601
    HTTP_User    ${ZO_ROOT_USER_EMAIL}
    HTTP_Passwd  ${ZO_ROOT_USER_PASSWORD}
    tls          Off
    Compress     gzip

[OUTPUT]
    Name         http
    Match        wazuh.*
    Host         openobserve
    Port         5080
    URI          /api/default/wazuh/_json
    Format       json
    Json_date_key _timestamp
    Json_date_format iso8601
    HTTP_User    ${ZO_ROOT_USER_EMAIL}
    HTTP_Passwd  ${ZO_ROOT_USER_PASSWORD}
    tls          Off
    Compress     gzip

[OUTPUT]
    Name         loki
    Match        bw.access
    Host         loki
    Port         3100
    Labels       job=bunkerweb, source=access
    Label_keys   $remote, $method, $path, $status
    Auto_Kubernetes_Labels Off

[OUTPUT]
    Name         loki
    Match        bw.error
    Host         loki
    Port         3100
    Labels       job=bunkerweb, source=error

[OUTPUT]
    Name         loki
    Match        bw.modsec
    Host         loki
    Port         3100
    Labels       job=bunkerweb, source=modsec

[OUTPUT]
    Name         loki
    Match        wazuh.*
    Host         loki
    Port         3100
    Labels       job=wazuh
    Label_keys   $wazuh_level, $wazuh_rule_id, $wazuh_agent, $wazuh_description, $wazuh_file

[OUTPUT]
    Name         prometheus_exporter
    Match        metrics.*
    Host         0.0.0.0
    Port         2021
