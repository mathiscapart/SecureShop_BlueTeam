<ossec_config>

  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>yes</logall_json>
  </global>

  <auth>
    <disabled>no</disabled>
    <port>1515</port>
  </auth>

  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
  </remote>

  <syscheck>
    <disabled>no</disabled>
    <frequency>60</frequency>
    <alert_new_files>yes</alert_new_files>
    <directories realtime="yes" report_changes="yes">/monitor</directories>
    <ignore>/monitor/assets</ignore>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
  </rootcheck>

  <command>
    <name>remove-webshell</name>
    <executable>remove-webshell.sh</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>

  <active-response>
    <command>remove-webshell</command>
    <location>local</location>
    <rules_id>100101</rules_id>
    <level>15</level>
  </active-response>

  <alerts>
    <log_alert_level>3</log_alert_level>
  </alerts>

  <logging>
    <log_format>json</log_format>
  </logging>

</ossec_config>
