<ossec_config>
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>20</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>wazuh-manager</manager_address>
      <port>1515</port>
      <agent_name>secureshop-agent</agent_name>
    </enrollment>
  </client>

  <syscheck>
    <disabled>no</disabled>
    <frequency>60</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <directories realtime="yes" report_changes="yes" check_all="yes">/monitor</directories>
    <ignore>/monitor/assets</ignore>
    <ignore>/monitor/Temp</ignore>
    <ignore>/monitor/Library</ignore>
    <ignore>/monitor/Logs</ignore>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
    <max_eps>50</max_eps>
  </syscheck>

  <rootcheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/bunkerweb/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/bunkerweb/error.log</location>
  </localfile>

  <active-response>
    <disabled>no</disabled>
  </active-response>

  <logging>
    <log_format>json</log_format>
  </logging>
</ossec_config>
