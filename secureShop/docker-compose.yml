networks:
  bw-services:
    external: true

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secureshop_web
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: secureshop
      DB_USER: secureshop
      DB_PASS: securepass
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bw-services
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: secureshop_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: secureshop
      MYSQL_USER: secureshop
      MYSQL_PASSWORD: securepass
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bw-services
    restart: unless-stopped

volumes:
  db_data:
